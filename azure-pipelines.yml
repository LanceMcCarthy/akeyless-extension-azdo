trigger:
  branches:
    include:
    - main
  paths:
   include:
     - 'azure-pipelines.yml'
     - 'tasks/**/*'

jobs:
  # ------- WINDOWS JOB --------#
  # Confirm outputs on Windows
  # ----------------------------#
  - job: GetAkeylessSecretsWindows
    displayName: 'Get Secrets [Windows]'
    pool:
      vmImage: 'windows-latest'
    steps:
    # Get credentials for Akeyless from Azure Service Principal
    - task: AzureCLI@2
      name: 'AzureCLI'
      inputs:
        azureSubscription: 'Azure MSA Account'
        scriptType: ps
        scriptLocation: inlineScript
        inlineScript: |
          $JWT=$(az account get-access-token --query accessToken --output tsv)
          echo "##vso[task.setvariable variable=azure_jwt;isoutput=true;issecret=true]$JWT"
      displayName: 'Get JWT from Azure Service Principal'

    # Get static secrets
    - task: akeyless-secrets@1
      name: 'AkeylessStatic'
      inputs:
        accessid: 'p-sxfgaph9urt4om'
        azureJwt: '$(AzureCLI.azure_jwt)'
        staticSecrets: '{"/samples/multiline-example":"EXAMPLE_MULTILINE_RSA_KEY","/samples/azdo-test-secret":"EXAMPLE_STATIC_STRING" }'
      displayName: 'Get Static Secrets'

    # Verify static secret outputs
    - powershell: |
        Write-Host "✅ Output (azdo-test-secret): $(AkeylessStatic.EXAMPLE_STATIC_STRING)"
      displayName: '[Static] Check static secret outputs'

    - powershell: |
        $multilineValue = '$(AkeylessStatic.EXAMPLE_MULTILINE_RSA_KEY)'
        if ('$(AkeylessStatic.EXAMPLE_MULTILINE_RSA_KEY_ENCODING)' -eq 'base64') {
          $multilineValue = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($multilineValue))
        }
        Write-Host "✅ Output (multiline-example) length: $($multilineValue.Length)"
      displayName: '[Static] Check multiline static secret outputs'

    # Get dynamic secrets
    - task: akeyless-secrets@1
      name: 'AkeylessDynamic'
      inputs:
        accessid: 'p-sxfgaph9urt4om'
        azureJwt: '$(AzureCLI.azure_jwt)'
        dynamicSecrets: '{"/az-dvlup-sqlsrvsecret":"mySqlSecret", "/entra-id-live":"myEntraSecret"}'
        timeout: 30
      displayName: 'Get Dynamic Secrets'

    # Verify dynamic secret pre-parsed outputs
    - powershell: |
        try {
          Write-Host "🧪 TEST 1 - Verify mySqlSecret's autogenerated outputs..."
          Write-Output "mySqlSecret_id: $(AkeylessDynamic.mySqlSecret_id)"
          Write-Output "mySqlSecret_password: $(AkeylessDynamic.mySqlSecret_password)"
          Write-Output "mySqlSecret_ttl_in_minutes: $(AkeylessDynamic.mySqlSecret_ttl_in_minutes)"
          Write-Output "mySqlSecret_user: $(AkeylessDynamic.mySqlSecret_user)"
          Write-Host "🏁---------------------------🏁"
          Write-Host "🧪 TEST 2 - myEntraSecret's autogenerated outputs..."
          Write-Output "myEntraSecret_id_secret_name: $(AkeylessDynamic.myEntraSecret_id_secret_name)"
          Write-Output "myEntraSecret_id_secret_key_id: $(AkeylessDynamic.myEntraSecret_id_secret_key_id)"
          Write-Output "myEntraSecret_msg: $(AkeylessDynamic.myEntraSecret_msg)"
          Write-Output "myEntraSecret_secret_appId: $(AkeylessDynamic.myEntraSecret_secret_appId)"
          Write-Output "myEntraSecret_secret_displayName: $(AkeylessDynamic.myEntraSecret_secret_displayName)"
          Write-Output "myEntraSecret_secret_endDateTime: $(AkeylessDynamic.myEntraSecret_secret_endDateTime)"
          Write-Output "myEntraSecret_secret_keyId: $(AkeylessDynamic.myEntraSecret_secret_keyId)"
          Write-Output "myEntraSecret_secret_secretText: $(AkeylessDynamic.myEntraSecret_secret_secretText)"
          Write-Output "myEntraSecret_secret_tenantId: $(AkeylessDynamic.myEntraSecret_secret_tenantId)"
          Write-Output "myEntraSecret_ttl_in_minutes: $(AkeylessDynamic.myEntraSecret_ttl_in_minutes)"
          Write-Host "🏁---------------------------🏁"
        } catch {
            Write-Output "Failed read the automatically generated outputs: $($_.Exception.Message)"
        }
      displayName: '[Dynamic] Check pre-parsed outputs'

    # Verify dynamic secret raw outputs
    - powershell: |
        Write-Host "🧪 TEST 1 - Parse mySqlSecret's plain output..."
        try {
          $sql = $env:SQL_SECRET_JSON | ConvertFrom-Json
          Write-Host "Available properties: $($sql.PSObject.Properties.Name -join ', ')"
          Write-Host "user: $($sql.user)"
          Write-Host "password: $($sql.password)"
          Write-Host "ttl_in_minute: $($sql.ttl_in_minute)"
          Write-Host "id: $($sql.id)"
          Write-Host "✅ Successfully parsed SQL dynamic secret's JSON."
        } catch {
          Write-Output "❌ Failed to parse SQL dynamic secret: $($_.Exception.Message)"
        }
        Write-Host "🧪 TEST 2 - Parse myEntraSecret's plain output..."
        try {
          $entra = $env:ENTRA_SECRET_JSON | ConvertFrom-Json
          Write-Host "Available properties: $($entra.PSObject.Properties.Name -join ', ')"
          Write-Host "keyId: $($entra.secret.keyId)"
          Write-Host "appId: $($entra.secret.appId)"
          Write-Host "tenantId: $($entra.secret.tenantId)"
          Write-Host "secretText: $($entra.secret.secretText)"
          Write-Host "endDateTime: $($entra.secret.endDateTime)"
          Write-Host "✅ Successfully parsed Entra ID dynamic secret's JSON."
        } catch {
          Write-Output "❌ Failed to parse Entra dynamic secret: $($_.Exception.Message)"
        }
      displayName: '[Dynamic] Parse full outputs.'
      env:
        # IMPORTANT: See caution note https://github.com/LanceMcCarthy/akeyless-extension-azdo?tab=readme-ov-file#plain-output
        SQL_SECRET_JSON: $(AkeylessDynamic.mySqlSecret)
        ENTRA_SECRET_JSON: $(AkeylessDynamic.myEntraSecret)

  # -------- LINUX JOB ---------#
  # Confirm outputs on Linux
  # ----------------------------#
  - job: GetAkeylessSecretsLinux
    displayName: 'Get Secrets [Linux]'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    # Get credentials for Akeyless from Azure Service Principal
    - task: AzureCLI@2
      name: 'AzureCLI'
      inputs:
        azureSubscription: 'Azure MSA Account'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          JWT=$(az account get-access-token --query accessToken --output tsv)
          echo "##vso[task.setvariable variable=azure_jwt;isoutput=true;issecret=true]$JWT"
      displayName: 'Get JWT from Azure Service Principal'

    # Get static secrets
    - task: akeyless-secrets@1
      name: 'AkeylessStatic'
      inputs:
        accessid: 'p-sxfgaph9urt4om'
        azureJwt: '$(AzureCLI.azure_jwt)'
        staticSecrets: '{"/samples/multiline-example":"EXAMPLE_MULTILINE_RSA_KEY","/samples/azdo-test-secret":"EXAMPLE_STATIC_STRING" }'
      displayName: 'Get Static Secrets'

    # Verify static secret outputs
    - bash: |
        echo "✅ Output (azdo-test-secret): $(AkeylessStatic.EXAMPLE_STATIC_STRING)"
      displayName: '[Static] Check static secret outputs'

    - bash: |
        multiline_value='$(AkeylessStatic.EXAMPLE_MULTILINE_RSA_KEY)'
        if [ '$(AkeylessStatic.EXAMPLE_MULTILINE_RSA_KEY_ENCODING)' = 'base64' ]; then
          multiline_value="$(printf '%s' "$multiline_value" | base64 -d)"
        fi
        printf '✅ Output (multiline-example) length: %s\n' "${#multiline_value}"
      displayName: '[Static] Check multiline static secret outputs'

    # Get dynamic secrets
    - task: akeyless-secrets@1
      name: 'AkeylessDynamic'
      inputs:
        accessid: 'p-sxfgaph9urt4om'
        azureJwt: '$(AzureCLI.azure_jwt)'
        dynamicSecrets: '{"/az-dvlup-sqlsrvsecret":"mySqlSecret", "/entra-id-live":"myEntraSecret"}'
        timeout: 30
      displayName: 'Get Dynamic Secrets'

    # Verify dynamic secret pre-parsed outputs
    - bash: |
        echo "🧪 TEST 1 - Verify mySqlSecret autogenerated outputs..."
        echo "mySqlSecret_id: $(AkeylessDynamic.mySqlSecret_id)"
        echo "mySqlSecret_password: $(AkeylessDynamic.mySqlSecret_password)"
        echo "mySqlSecret_ttl_in_minutes: $(AkeylessDynamic.mySqlSecret_ttl_in_minutes)"
        echo "mySqlSecret_user: $(AkeylessDynamic.mySqlSecret_user)"
        echo "🏁---------------------------🏁"
        echo "🧪 TEST 2 - Verify myEntraSecret autogenerated outputs..."
        echo "myEntraSecret_id_secret_name: $(AkeylessDynamic.myEntraSecret_id_secret_name)"
        echo "myEntraSecret_id_secret_key_id: $(AkeylessDynamic.myEntraSecret_id_secret_key_id)"
        echo "myEntraSecret_msg: $(AkeylessDynamic.myEntraSecret_msg)"
        echo "myEntraSecret_secret_appId: $(AkeylessDynamic.myEntraSecret_secret_appId)"
        echo "myEntraSecret_secret_displayName: $(AkeylessDynamic.myEntraSecret_secret_displayName)"
        echo "myEntraSecret_secret_endDateTime: $(AkeylessDynamic.myEntraSecret_secret_endDateTime)"
        echo "myEntraSecret_secret_keyId: $(AkeylessDynamic.myEntraSecret_secret_keyId)"
        echo "myEntraSecret_secret_secretText: $(AkeylessDynamic.myEntraSecret_secret_secretText)"
        echo "myEntraSecret_secret_tenantId: $(AkeylessDynamic.myEntraSecret_secret_tenantId)"
        echo "myEntraSecret_ttl_in_minutes: $(AkeylessDynamic.myEntraSecret_ttl_in_minutes)"
        echo "🏁---------------------------🏁"
      displayName: '[Dynamic] Check pre-parsed outputs'

    # Verify dynamic secret raw outputs
    - bash: |
        echo "🧪 TEST 1 - Parse mySqlSecret plain output..."
        if sql=$(jq . <<< "$SQL_SECRET_JSON" 2>/dev/null); then
          echo "Available properties: $(jq -r 'keys | join(", ")' <<< "$sql")"
          echo "user: $(jq -r '.user' <<< "$sql")"
          echo "password: $(jq -r '.password' <<< "$sql")"
          echo "ttl_in_minute: $(jq -r '.ttl_in_minute' <<< "$sql")"
          echo "id: $(jq -r '.id' <<< "$sql")"
          echo "✅ Successfully parsed SQL dynamic secret JSON."
        else
          echo "❌ Failed to parse SQL dynamic secret: Invalid JSON"
        fi

        echo "🧪 TEST 2 - Parse myEntraSecret plain output..."
        if entra=$(jq . <<< "$ENTRA_SECRET_JSON" 2>/dev/null); then
          echo "Available properties: $(jq -r 'keys | join(", ")' <<< "$entra")"
          echo "keyId: $(jq -r '.secret.keyId' <<< "$entra")"
          echo "appId: $(jq -r '.secret.appId' <<< "$entra")"
          echo "tenantId: $(jq -r '.secret.tenantId' <<< "$entra")"
          echo "secretText: $(jq -r '.secret.secretText' <<< "$entra")"
          echo "endDateTime: $(jq -r '.secret.endDateTime' <<< "$entra")"
          echo "✅ Successfully parsed Entra ID dynamic secret JSON."
        else
          echo "❌ Failed to parse Entra dynamic secret: Invalid JSON"
        fi
      displayName: '[Dynamic] Parse full outputs.'
      env:
        # IMPORTANT: See caution note https://github.com/LanceMcCarthy/akeyless-extension-azdo?tab=readme-ov-file#plain-output
        SQL_SECRET_JSON: $(AkeylessDynamic.mySqlSecret)
        ENTRA_SECRET_JSON: $(AkeylessDynamic.myEntraSecret)
