#ref https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/tasks/akeyless-secrets"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
      # uuid >= 9 dropped the uuid/v4 sub-path export that azure-pipelines-task-lib@5.x
      # requires. The override cannot be applied until Microsoft updates task-lib.
      # Track progress in: https://github.com/LanceMcCarthy/akeyless-extension-azdo/issues/99
      - dependency-name: "uuid"
        versions: [">=9.0.0"]
    groups:
      all-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
      all-security-updates:
        applies-to: security-updates
        patterns:
          - "*"
